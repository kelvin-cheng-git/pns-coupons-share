<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MUI CHUNG PING - 百佳超級市場電子禮券</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

    <style>
        :root {
            --primary: #0066cc;
            --primary-hover: #0052a3;
            --success: #34c759;
            --bg-color: #f2f2f7;
            --card-bg: #ffffff;
            --border: #e5e5ea;
            --text-dark: #1c1c1e;
            --text-muted: #8e8e93;
            --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 16px rgba(0,0,0,0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* Centralized App Container for Desktop */
        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Beautiful Modern Header */
        .header-card {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            padding: 24px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-md);
            position: relative;
            overflow: hidden;
        }

        /* Decorative background element for header */
        .header-card::after {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
        }

        .header-card h2 {
            margin: 0 0 16px 0;
            font-size: 22px;
            color: #ffd60a;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .meta-line {
            font-size: 14px;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.85);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tracker-bar {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 600;
            font-size: 16px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .sync-indicator {
            text-align: center;
            font-size: 13px;
            color: var(--success);
            margin-bottom: 16px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: #e5f9e7;
            padding: 6px 16px;
            border-radius: 20px;
            align-self: center;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            display: inline-block;
            animation: blink 1.5s infinite;
        }
        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; box-shadow: 0 0 8px var(--success);} 100% { opacity: 0.3; } }

        /* Responsive Grid: 1 col on mobile, 2 cols on desktop */
        .coupon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
            padding-bottom: 30px;
            flex-grow: 1;
        }

        .coupon-row {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: all 0.25s cubic-bezier(0.075, 0.82, 0.165, 1);
        }

        /* Desktop hover effect */
        @media (hover: hover) {
            .coupon-row:hover {
                transform: translateY(-3px);
                box-shadow: var(--shadow-md);
                border-color: #d1d1d6;
            }
        }

        .left-zone {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-grow: 1;
        }

        .checkbox-wrapper {
            position: relative;
            width: 36px; 
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px;
            transition: transform 0.1s ease;
        }

        .checkbox-wrapper:active {
            transform: scale(0.9);
        }

        .custom-check {
            width: 26px;
            height: 26px;
            border: 2px solid #c7c7cc;
            border-radius: 50%; /* Making it circular looks more modern */
            display: inline-block;
            box-sizing: border-box;
            background: white;
            position: relative;
            transition: all 0.2s ease;
        }

        .coupon-row.checked .custom-check {
            background: var(--success);
            border-color: var(--success);
        }

        .coupon-row.checked .custom-check::after {
            content: '';
            position: absolute;
            left: 8px;
            top: 4px;
            width: 5px;
            height: 11px;
            border: solid white;
            border-width: 0 2.5px 2.5px 0;
            transform: rotate(45deg);
        }

        .coupon-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .coupon-title {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-dark);
            transition: color 0.2s ease;
        }

        .coupon-row.checked .coupon-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .coupon-status {
            font-size: 13px;
            color: var(--success);
            font-weight: 500;
        }

        .coupon-row.checked .coupon-status {
            color: var(--text-muted);
        }

        .open-btn {
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            white-space: nowrap;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        @media (hover: hover) {
            .open-btn:hover {
                background-color: var(--primary-hover);
                transform: scale(1.02);
            }
        }

        .open-btn:active {
            transform: scale(0.98);
        }

        .coupon-row.checked .open-btn {
            background-color: #f2f2f7;
            color: #aeaeb2;
            pointer-events: none;
        }

        .footer-note {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            margin-top: auto;
            padding-top: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-card">
            <h2>🛒 百佳超級市場 電子禮券</h2>
            <div class="meta-line">👤 <b>登記姓名：</b> MUI CHUNG PING</div>
            <div class="meta-line">🔢 <b>參考編號：</b> C260211074</div>
            <div class="tracker-bar">

            未必即刻覆嘅客服：CK wing 🙇‍♂️

            { id: 3, url: "https://evhk.aswatson.com/evp/webview/retrieval/web/3031c172e2593431e0292f29565c312433cb0e111b710889796b260070fb89c31918fc12dbdb677e178440958ee3c007c9c8c130a1b13e663af6e3427cdac2f849c1" },
            { id: 4, url: "https://evhk.aswatson.com/evp/webview/retrieval/web/3031d5bd149921106fa9aa305086bfdb233f55f981596c0f9336c0a0ce988830e61192841cf9c190906658be778eddc43400f9bbd037ebb076acc7450dcafa7e004c" },

            { id: 20, url: "https://evhk.aswatson.com/evp/webview/retrieval/web/3031eda7b2949bb18d7b467ed4886a2dde47849f4c644c07ab3d2045337f2a331b851504266400e9e7ebd5e4f484cb6c0db909358c2eebb38b8fc1cc3ff190641a29" }
        ];

        let currentState = {};

        // 2. LISTEN FOR LIVE CHANGES
        db.on("value", (snapshot) => {
            const data = snapshot.val();
            
            if (!data) {
                db.update({ 1: true, 2: true, 3: true });
                return;
            }
            
            currentState = data;
            document.getElementById('syncStatus').innerHTML = '<span class="pulse"></span> 即時同步已連線';
            renderUI();
        });

        // 3. RENDER THE INTERFACE
        function renderUI() {
            const container = document.getElementById('couponContainer');
            container.innerHTML = '';
            let checkedCount = 0;

            couponsData.forEach(coupon => {
                const isChecked = currentState[coupon.id] === true;
                if (isChecked) checkedCount++;
                
                const row = document.createElement('div');
                row.className = `coupon-row ${isChecked ? 'checked' : ''}`;
                
                row.innerHTML = `
                    <div class="left-zone">
                        <div class="checkbox-wrapper" onclick="toggleCoupon(${coupon.id})">
                            <span class="custom-check"></span>
                        </div>
                        <div class="coupon-info">
                            <span class="coupon-title">第 ${coupon.id.toString().padStart(2, '0')} 張 ($100)</span>
                            <span class="coupon-status">${isChecked ? '已使用' : '可使用'}</span>
                        </div>
                    </div>
                    <a class="open-btn" href="${coupon.url}" target="_blank" onclick="autoMarkUsed(${coupon.id})">
                        ${isChecked ? '已用完' : '打開禮券'}
                    </a>
                `;
                container.appendChild(row);
            });

            document.getElementById('checked-count').innerText = checkedCount;
            document.getElementById('remaining-funds').innerText = (20 - checkedCount) * 100;
        }

        // 4. WRITE CHANGES TO FIREBASE
        function toggleCoupon(id) {
            const newValue = !(currentState[id] === true);
            db.child(id.toString()).set(newValue);
        }

        function autoMarkUsed(id) {
            if (currentState[id] !== true) {
                db.child(id.toString()).set(true);
            }
        }
    </script>
</body>
